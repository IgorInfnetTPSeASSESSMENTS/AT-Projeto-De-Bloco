name: Load Test - Locust

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      alb_dns_name:
        required: true
        type: string

permissions:
  contents: read

jobs:
  load_test:
    name: Load test with Locust
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Locust
        run: |
          python -m pip install --upgrade pip
          pip install locust==2.24.1

      - name: Run Locust
        run: |
          HOST="http://${{ inputs.alb_dns_name }}"
          echo "Rodando Locust contra $HOST"

          locust \
            -f locustfile.py \
            --headless \
            -u 20 \
            -r 5 \
            --run-time 1m \
            --host "$HOST" \
            --html locust-report.html \
            --csv locust-report

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report-${{ inputs.environment_name }}
          path: |
            locust-report.html
            locust-report_stats.csv
            locust-report_failures.csv
            locust-report_exceptions.csv

      - name: Load test summary
        if: always()
        run: |
          {
            echo "## Load Test Summary"
            echo ""
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- Host: \`http://${{ inputs.alb_dns_name }}\`"
            echo "- Usuários: \`20\`"
            echo "- Ramp-up: \`5/s\`"
            echo "- Duração: \`1m\`"
          } >> "$GITHUB_STEP_SUMMARY"
